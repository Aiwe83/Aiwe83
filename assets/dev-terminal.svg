<svg xmlns="http://www.w3.org/2000/svg" width="280" height="200" viewBox="0 0 280 200" fill="none" role="img" aria-label="Dev terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F0FF"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF006E"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="272" height="192" rx="12" fill="url(#bg)" stroke="url(#border)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <rect x="4" y="4" width="272" height="24" rx="12" fill="#161B22"/>
  <rect x="4" y="16" width="272" height="12" fill="#161B22"/>
  <line x1="4" y1="28" x2="276" y2="28" stroke="#30363D" stroke-width="0.5"/>

  <circle cx="18" cy="16" r="4.5" fill="#FF006E"/>
  <circle cx="32" cy="16" r="4.5" fill="#F7DF1E"/>
  <circle cx="46" cy="16" r="4.5" fill="#00F0FF"/>
  <text x="140" y="19" fill="#6B7280" font-family="monospace" font-size="10" text-anchor="middle">~/pablo — zsh</text>

  <g font-family="monospace" font-size="11">
    <text x="14" y="52" fill="#00F0FF">$ whoami</text>
    <text x="14" y="68" fill="#FF006E">Pablo De Franchi</text>

    <text x="14" y="90" fill="#00F0FF">$ cat stack.txt</text>
    <text x="14" y="106" fill="#7C3AED">TS · React · Node · PG</text>

    <text x="14" y="128" fill="#00F0FF">$ status</text>
    <text x="14" y="144" fill="#10B981">⚡ shipping · learning</text>

    <text x="14" y="172" fill="#00F0FF">$ </text>
    <text x="26" y="172" fill="#ffffff">
      <tspan>▋</tspan>
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
